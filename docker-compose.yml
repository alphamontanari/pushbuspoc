services:
  pushbus-poc:
    build:
      context: .
      dockerfile: Dockerfile
    image: pushbus-poc-001a:production
    container_name: pushbus-poc-001a
    restart: unless-stopped

    environment:
      PORT: "3000"
      NODE_ENV: "production"
      TZ: "America/Sao_Paulo"

      ALLOW_MOCK: "false"
      POLL_INTERVAL_SECONDS: "5"
      STALE_AFTER_SECONDS: "90"

      LINE_CODE: "01A"
      LINE_CODE_ALT: "001A"
      STRICT_LINE_FILTER: "true"

      CITTATI_BASE_URL: "https://flits.cittati.com.br"
      CITTATI_APP_CODE: "200"
      CITTATI_CLIENT_ID: "1"
      CITTATI_COMPANY_ID: "PREENCHER"
      CITTATI_USERNAME: "PREENCHER"
      CITTATI_PASSWORD: "PREENCHER"
      CITTATI_TOKEN: ""

      DEFAULT_VEHICLES: "26002"
      DEFAULT_LINES: ""

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.pushbus-poc.rule=Host(`poc.i9itape.com.br`)"
      - "traefik.http.routers.pushbus-poc.entrypoints=websecure"
      - "traefik.http.routers.pushbus-poc.tls=true"
      - "traefik.http.routers.pushbus-poc.tls.certresolver=letsencrypt"

      - "traefik.http.services.pushbus-poc.loadbalancer.server.port=3000"

    networks:
      - web

networks:
  web:
    external: true